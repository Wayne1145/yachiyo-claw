apply plugin: 'com.android.application'
apply plugin: 'kotlin-android'

def newDreamStudioKeystore = rootProject.file('../.keys/newdreamstudio.keystore')
def hasNewDreamStudioKeystore = newDreamStudioKeystore.exists()
def releaseStorePassword = System.getenv('YACHIYO_KEYSTORE_PASSWORD')
def releaseKeyPassword = System.getenv('YACHIYO_KEY_PASSWORD')
def hasReleaseSigningCredentials = hasNewDreamStudioKeystore && releaseStorePassword && releaseKeyPassword

android {
    namespace "io.github.yachiyoclaw"
    compileSdk rootProject.ext.compileSdkVersion
    defaultConfig {
        applicationId "io.github.yachiyoclaw"
        minSdkVersion rootProject.ext.minSdkVersion
        targetSdkVersion rootProject.ext.targetSdkVersion
        versionCode 6
        versionName "0.0.6"
        testInstrumentationRunner "androidx.test.runner.AndroidJUnitRunner"
        aaptOptions {
             // Files and dirs to omit from the packaged assets dir, modified to accommodate modern web apps.
             // Default: https://android.googlesource.com/platform/frameworks/base/+/282e181b58cf72b6ca770dc7ca5f91f135444502/tools/aapt/AaptAssets.cpp#61
            ignoreAssetsPattern '!.svn:!.git:!.ds_store:!*.scc:.*:!CVS:!thumbs.db:!picasa.ini:!*~'
        }
    }
    compileOptions {
        sourceCompatibility JavaVersion.VERSION_21
        targetCompatibility JavaVersion.VERSION_21
    }
    kotlinOptions {
        jvmTarget = '21'
    }
    packagingOptions {
        jniLibs {
            useLegacyPackaging true
        }
    }
    signingConfigs {
        if (hasNewDreamStudioKeystore) {
            newDreamStudioDebug {
                storeFile newDreamStudioKeystore
                storePassword System.getenv('YACHIYO_KEYSTORE_PASSWORD') ?: 'android'
                keyAlias 'NewDreamStudio'
                keyPassword System.getenv('YACHIYO_KEY_PASSWORD') ?: 'android'
                enableV1Signing true
                enableV2Signing true
            }
        }
        if (hasReleaseSigningCredentials) {
            newDreamStudioRelease {
                storeFile newDreamStudioKeystore
                storePassword releaseStorePassword
                keyAlias 'NewDreamStudio'
                keyPassword releaseKeyPassword
                enableV1Signing true
                enableV2Signing true
            }
        }
    }
    buildTypes {
        debug {
            if (hasNewDreamStudioKeystore) {
                signingConfig signingConfigs.newDreamStudioDebug
            }
        }
        release {
            minifyEnabled false
            proguardFiles getDefaultProguardFile('proguard-android.txt'), 'proguard-rules.pro'
            if (hasReleaseSigningCredentials) {
                signingConfig signingConfigs.newDreamStudioRelease
            }
        }
    }
}

gradle.taskGraph.whenReady { graph ->
    def buildsRelease = graph.allTasks.any { it.name.toLowerCase().contains('release') }
    if (buildsRelease && !hasReleaseSigningCredentials) {
        throw new GradleException('Release signing requires YACHIYO_KEYSTORE_PASSWORD and YACHIYO_KEY_PASSWORD.')
    }
}

repositories {
    flatDir{
        dirs '../capacitor-cordova-android-plugins/src/main/libs', 'libs'
    }
}

dependencies {
    implementation fileTree(include: ['*.jar'], dir: 'libs')
    implementation "androidx.appcompat:appcompat:$androidxAppCompatVersion"
    implementation "androidx.coordinatorlayout:coordinatorlayout:$androidxCoordinatorLayoutVersion"
    implementation "androidx.core:core-splashscreen:$coreSplashScreenVersion"
    implementation "androidx.work:work-runtime:$androidxWorkVersion"
    implementation "androidx.room:room-runtime:$androidxRoomVersion"
    annotationProcessor "androidx.room:room-compiler:$androidxRoomVersion"
    implementation 'com.google.ai.edge.litertlm:litertlm-android:0.11.0'
    implementation 'com.google.mediapipe:tasks-text:0.10.26'
    implementation 'org.apache.commons:commons-compress:1.27.1'
    implementation project(':capacitor-android')
    implementation 'dev.rikka.shizuku:api:13.1.5'
    implementation 'dev.rikka.shizuku:provider:13.1.5'
    testImplementation "junit:junit:$junitVersion"
    androidTestImplementation "androidx.test.ext:junit:$androidxJunitVersion"
    androidTestImplementation "androidx.test.espresso:espresso-core:$androidxEspressoCoreVersion"
    implementation project(':capacitor-cordova-android-plugins')
}

apply from: 'capacitor.build.gradle'

try {
    def servicesJSON = file('google-services.json')
    if (servicesJSON.text) {
        apply plugin: 'com.google.gms.google-services'
    }
} catch(Exception e) {
    logger.info("google-services.json not found, google-services plugin not applied. Push Notifications won't work")
}
